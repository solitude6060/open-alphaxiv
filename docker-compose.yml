services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_alphaxiv
      POSTGRES_USER: open_alphaxiv
      POSTGRES_PASSWORD: open_alphaxiv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_alphaxiv -d open_alphaxiv"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      OPEN_ALPHAXIV_STORAGE_DIR: /app/data
      OPEN_ALPHAXIV_DATABASE_PATH: /app/data/open_alphaxiv.db
      OPEN_ALPHAXIV_CORS_ORIGIN: http://localhost:${WEB_PORT:-3100}
      OPEN_ALPHAXIV_CODEX_ENABLED: ${OPEN_ALPHAXIV_CODEX_ENABLED:-false}
      OPEN_ALPHAXIV_CODEX_CLI_PATH: ${OPEN_ALPHAXIV_CODEX_CLI_PATH:-codex}
      OPEN_ALPHAXIV_CODEX_MODEL: ${OPEN_ALPHAXIV_CODEX_MODEL:-}
      OPEN_ALPHAXIV_CODEX_TIMEOUT_SECONDS: ${OPEN_ALPHAXIV_CODEX_TIMEOUT_SECONDS:-180}
      OPEN_ALPHAXIV_CODEX_SANDBOX: ${OPEN_ALPHAXIV_CODEX_SANDBOX:-read-only}
      CODEX_HOME: ${CODEX_HOME:-}
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_AUTH_JSON_PATH: ${CODEX_AUTH_JSON_PATH:-}
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      OPEN_ALPHAXIV_STORAGE_DIR: /app/data
      OPEN_ALPHAXIV_DATABASE_PATH: /app/data/open_alphaxiv.db
    volumes:
      - app-data:/app/data
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "${WEB_PORT:-3100}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  app-data:
  postgres-data:
